<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Legal documents for the MistakeLab language-learning app.">
  <link rel="canonical" href="https://mistakelab.app/">
  <title>MistakeLab</title>
  <style>
    :root {
      color-scheme: light;
      --text: #1a1a2e;
      --muted: #5c5c7a;
      --accent: #5b4fcf;
      --bg: #f6f4ff;
      --card: #ffffff;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      line-height: 1.65;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    main {
      max-width: 24rem;
      padding: 2rem 1.25rem;
      background: var(--card);
      border-radius: 1rem;
      box-shadow: 0 4px 24px rgba(91, 79, 207, 0.08);
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.5rem;
    }
    p {
      color: var(--muted);
      margin: 0 0 1.5rem;
      font-size: 0.95rem;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li + li { margin-top: 0.75rem; }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>MistakeLab</h1>
    <p>Language learning through translation practice.</p>
    <ul>
      <li><a href="/privacy">Privacy Policy</a></li>
      <li><a href="/terms">Terms &amp; Conditions</a></li>
      <li><a href="/terms#impressum">Impressum</a></li>
    </ul>
  </main>
</body>
</html>
